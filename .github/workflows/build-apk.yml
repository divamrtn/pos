name: Build POS Kasir APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil repository
        uses: actions/checkout@v4

      - name: Siapkan Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Siapkan Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Siapkan Android SDK
        uses: android-actions/setup-android@v3

      - name: Install paket Android SDK
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Buat project Android POS otomatis
        shell: bash
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/divamartin/poskasir
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets/assets
          base64 -d > settings.gradle <<'EOF'
cGx1Z2luTWFuYWdlbWVudCB7CiAgICByZXBvc2l0b3JpZXMgewogICAgICAgIGdvb2dsZSgpCiAg
